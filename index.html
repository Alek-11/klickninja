<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Hunde & Katzen Ninja</title>
<style>
body {
    margin:0;
    text-align:center;
    background:#111;
    color:white;
    font-family:Arial;
}
canvas {
    display:block;
    margin:auto;
}
button {
    margin:5px;
    padding:8px 15px;
    font-size:16px;
}
</style>
</head>
<body>

<div>
Punkte: <span id="score">0</span> |
Leben: <span id="lives">3</span> |
Level: <span id="level">1</span> |
Combo: <span id="combo">x1</span>
</div>

<button onclick="togglePause()">Pause</button>
<button onclick="restartGame()">Neustart</button>

<canvas id="game" width="700" height="450"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let score=0, lives=3, level=1, combo=1;
let lastHitTime=0;

let animals=[];
let particles=[]; // ✨ NEU

let spawnRate=2500;
let gravity=0.12;
let speedMultiplier=1;

let paused=false;
let gameOver=false;

let spawner=null;

let mouseX=0, mouseY=0;

// Boss
let bossActive=false;
let bossClicks=0;
let bossRequired=25;
let bossTime=15;
let bossLives=3;
let bossTimer=null;

const comboTime=800;

// -------- Hintergrund --------
function drawBackground(){
    let sky=ctx.createLinearGradient(0,0,0,450);
    sky.addColorStop(0,"#4facfe");
    sky.addColorStop(1,"#dbe9f4");
    ctx.fillStyle=sky;
    ctx.fillRect(0,0,700,450);

    ctx.beginPath();
    ctx.arc(600,80,40,0,Math.PI*2);
    ctx.fillStyle="yellow";
    ctx.fill();

    ctx.fillStyle="#4caf50";
    ctx.fillRect(0,350,700,100);
}

// -------- Animal --------
class Animal{
constructor(){
    this.x=Math.random()*650;
    this.y=460;

    this.isRobot=false;
    this.isLifeStealer=false;
    this.isAngel=false; // 😇 NEU

    let r=Math.random();

    if(r<0.22){
        this.type="🐶"; this.points=1;
    }
    else if(r<0.44){
        this.type="🐱"; this.points=1;
    }
    else if(r<0.6){
        this.type="😺"; this.points=2;
    }
    else if(r<0.75){
        this.type="🤖"; this.points=-3;
        this.isRobot=true;
    }
    else if(r<0.9){
        this.type="👿"; this.points=0;
        this.isLifeStealer=true;
    }
    else{
        this.type="😇"; this.points=0;
        this.isAngel=true;
    }

    if(this.isRobot){
        this.vy=-(6+Math.random()*3);
    } else {
        this.vy=-(7.5+Math.random()*3.5)*speedMultiplier;
    }
}

update(){
    this.vy+=gravity;
    this.y+=this.vy;
}

draw(){
    ctx.font="36px Arial";

    if(this.isAngel){
        ctx.fillStyle="gold";

        // ✨ Glitzer erzeugen
        particles.push({
            x: this.x+15,
            y: this.y-20,
            vx:(Math.random()-0.5)*1,
            vy:-Math.random()*1.5,
            life:30
        });

    }
    else if(this.isLifeStealer){
        ctx.fillStyle="purple";
    }
    else if(this.isRobot){
        ctx.fillStyle="red";
    }
    else{
        ctx.fillStyle="black";
    }

    ctx.fillText(this.type,this.x,this.y);
}
}

// -------- Partikel --------
function drawParticles(){
    particles.forEach((p,i)=>{
        p.x+=p.vx;
        p.y+=p.vy;
        p.life--;

        ctx.fillStyle="rgba(255,255,150,"+(p.life/30)+")";
        ctx.fillRect(p.x,p.y,3,3);

        if(p.life<=0){
            particles.splice(i,1);
        }
    });
}

// -------- Spawn --------
function spawnAnimal(){
    if(!paused && !gameOver && !bossActive){
        animals.push(new Animal());
    }
}

function restartSpawner(){
    if(spawner!==null) clearInterval(spawner);
    spawner=setInterval(spawnAnimal,spawnRate);
}

// -------- Input --------
canvas.addEventListener("mousemove",e=>{
let rect=canvas.getBoundingClientRect();
mouseX=e.clientX-rect.left;
mouseY=e.clientY-rect.top;
});

canvas.addEventListener("click",()=>{

if(gameOver) return;

// Boss
if(bossActive){
    if(!paused){
        bossClicks++;
        if(bossClicks>=bossRequired){
            bossLives--;
            if(bossLives<=0){
                bossActive=false;
                clearInterval(bossTimer);
            } else {
                bossClicks=0;
                bossTime=15;
            }
        }
    }
    return;
}

// Tiere klicken
animals.forEach((a,i)=>{

if(mouseX>a.x && mouseX<a.x+40 && mouseY>a.y-40 && mouseY<a.y){

    if(a.isAngel){
        lives++; // ❤️
        combo=1;
    }
    else if(a.isLifeStealer){
        lives--;
        combo=1;
    }
    else if(a.points>0){
        let now=Date.now();
        combo=(now-lastHitTime<comboTime)?combo+1:1;
        lastHitTime=now;
        score+=a.points*combo;
    }
    else{
        combo=1;
        score+=a.points;
        if(score<0) score=0;
    }

    animals.splice(i,1);
}

});

});

// -------- Boss --------
function startBoss(){
bossActive=true;
bossClicks=0;
bossRequired=level*25;
bossTime=15;
bossLives=3;

bossTimer=setInterval(()=>{
    if(paused) return;

    bossTime--;
    if(bossTime<=0){
        bossTime=15;
        bossClicks=0;
    }
},1000);
}

// -------- Level --------
function updateLevel(){
let newLevel=Math.floor(score/25)+1;

if(newLevel!==level){
    level=newLevel;
    spawnRate=Math.max(700,2500-level*200);
    speedMultiplier=1+(level*0.15);
    restartSpawner();
    startBoss();
}
}

// -------- Controls --------
function togglePause(){
    paused=!paused;
}

function restartGame(){
score=0; lives=3; level=1; combo=1;
speedMultiplier=1;
spawnRate=2500;
animals=[];
particles=[];
bossActive=false;
bossLives=3;
gameOver=false;
paused=false;
restartSpawner();
}

// -------- Game Loop --------
function gameLoop(){

drawBackground();
drawParticles(); // ✨

// PAUSE
if(paused){
    ctx.fillStyle="rgba(0,0,0,0.5)";
    ctx.fillRect(0,0,700,450);
    ctx.fillStyle="white";
    ctx.font="50px Arial";
    ctx.fillText("PAUSE",250,220);
    requestAnimationFrame(gameLoop);
    return;
}

// Boss
if(bossActive){

ctx.fillStyle="rgba(0,0,0,0.7)";
ctx.fillRect(0,0,700,450);

ctx.font="120px Arial";
ctx.fillText("🤖",260,200);

ctx.font="25px Arial";
ctx.fillStyle="white";
ctx.fillText("Boss Leben: "+bossLives,250,60);
ctx.fillText("Clicks: "+bossClicks+"/"+bossRequired,220,300);
ctx.fillText("Zeit: "+bossTime,300,350);

}
else{

animals.forEach((a,i)=>{

    a.update();
    a.draw();

    if(a.y>460){

        if(!a.isRobot && !a.isLifeStealer && !a.isAngel){
            lives--;
        }

        animals.splice(i,1);
    }
});

}

// UI
document.getElementById("score").innerText=score;
document.getElementById("lives").innerText=lives;
document.getElementById("level").innerText=level;
document.getElementById("combo").innerText="x"+combo;

updateLevel();

if(lives<=0){
    ctx.fillStyle="red";
    ctx.font="50px Arial";
    ctx.fillText("GAME OVER",200,220);
    gameOver=true;
    return;
}

requestAnimationFrame(gameLoop);
}

// Start
restartSpawner();
gameLoop();
</script>

</body>
</html>
