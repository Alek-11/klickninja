<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Hunde & Katzen Ninja PRO - FINAL FIX + SHOP</title>
<style>
    body { margin:0; text-align:center; background:#111; color:white; font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
    canvas { display:block; margin:20px auto; background:#000; border: 4px solid #333; border-radius: 8px; cursor: crosshair; }
    .stats { font-size: 20px; margin: 10px; }
    button { padding:10px 20px; font-size:16px; cursor:pointer; background: #444; color: white; border: none; border-radius: 5px; margin: 5px; }
    button:hover { background: #666; }

    /* SHOP STYLES */
    #shop-overlay {
        display: none;
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(0, 0, 0, 0.9);
        padding: 20px;
        border: 3px solid #fdbb2d;
        border-radius: 15px;
        z-index: 10;
        width: 300px;
    }
    .shop-item { margin: 15px 0; padding: 10px; border-bottom: 1px solid #444; }
    .shop-item button { background: #28a745; width: 100%; }
</style>
</head>
<body>

<div class="stats">
    Punkte: <span id="score">0</span> | Leben: <span id="lives">3</span> | Level: <span id="level">1</span> | Combo: <span id="combo">x1</span>
</div>

<button onclick="togglePause()">Shop / Pause</button>
<button onclick="restartGame()">Neustart</button>

<!-- SHOP OVERLAY -->
<div id="shop-overlay">
    <h2>Ninja Shop</h2>
    <p>Deine Punkte: <span id="shop-points">0</span></p>
    <div class="shop-item">
        <span>❤️ +1 Leben</span>
        <button onclick="buyItem('life', 50)">Kaufen (50 Pkt)</button>
    </div>
    <div class="shop-item">
        <span>⚡ Combo-Booster</span>
        <button onclick="buyItem('combo', 100)">Kaufen (100 Pkt)</button>
    </div>
    <button onclick="togglePause()" style="background:#cc0000; margin-top:10px;">Schließen</button>
</div>

<canvas id="game" width="700" height="450"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let score=0, lives=3, level=1, combo=1;
let lastHitTime=0;
let animals=[];
let particles=[];
let trail = []; 

let spawnRate=2500;
let gravity=0.15;
let speedMultiplier=1;
let paused=false, gameOver=false;
let spawner=null;
let mouseX=0, mouseY=0;

let bossActive=false, bossClicks=0, bossRequired=25, bossTime=15, bossLives=2, bossTimer=null;
let comboBonus = 0; // Shop Upgrade
const comboTime=800;

// SHOP FUNKTION
function buyItem(type, price) {
    if (score >= price) {
        score -= price;
        if (type === 'life') lives++;
        if (type === 'combo') comboBonus += 1;
        updateUI();
        alert("Upgrade gekauft!");
    } else {
        alert("Zu wenig Punkte!");
    }
}

function updateUI() {
    document.getElementById("score").innerText = score;
    document.getElementById("shop-points").innerText = score;
    document.getElementById("lives").innerText = lives;
    document.getElementById("level").innerText = level;
    document.getElementById("combo").innerText = "x" + (combo + comboBonus);
}

function drawBackground(){
    let sky=ctx.createLinearGradient(0,0,0,450);
    sky.addColorStop(0,"#1a2a6c");
    sky.addColorStop(0.5,"#b21f1f");
    sky.addColorStop(1,"#fdbb2d");
    ctx.fillStyle=sky;
    ctx.fillRect(0,0,700,450);
    ctx.fillStyle="rgba(34, 139, 34, 0.8)";
    ctx.fillRect(0,400,700,50);
}

function drawTrail() {
    if (trail.length < 2) return;
    ctx.save();
    ctx.beginPath();
    ctx.strokeStyle = "#00ffff"; 
    ctx.lineWidth = 6;
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    ctx.shadowBlur = 20;
    ctx.shadowColor = "#00ffff";
    ctx.moveTo(trail[0].x, trail[0].y);
    for (let i = 1; i < trail.length; i++) {
        ctx.lineTo(trail[i].x, trail[i].y);
    }
    ctx.stroke();
    ctx.strokeStyle = "white";
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.restore();
}

class Animal {
    constructor(){
        this.x = 50 + Math.random()*600;
        this.y = 460;
        this.isRobot=false; this.isLifeStealer=false; this.isAngel=false;
        let r=Math.random();
        if(r<0.20){ this.type="🐶"; this.color="#ffcc33"; this.points=1; }
        else if(r<0.40){ this.type="🐱"; this.color="#ff99cc"; this.points=1; }
        else if(r<0.55){ this.type="😺"; this.color="#ff6600"; this.points=2; }
        else if(r<0.70){ this.type="🤖"; this.color="#777"; this.points=-5; this.isRobot=true; }
        else if(r<0.82){ this.type="👿"; this.color="#9900cc"; this.isLifeStealer=true; }
        else if(r<0.90){ this.type="😇"; this.color="#ffffff"; this.isAngel=true; }
        else { this.type="🐹"; this.color="#ffd700"; this.points=10; } 
        this.vy = -(8 + Math.random()*4) * speedMultiplier;
        this.vx = (Math.random() - 0.5) * 4;
    }
    update(){ this.vy += gravity; this.y += this.vy; this.x += this.vx; }
    draw(){ ctx.font="40px Arial"; ctx.textAlign="center"; ctx.fillText(this.type, this.x, this.y); }
}

function createBurst(x, y, color) {
    for(let i=0; i<10; i++) {
        particles.push({x: x, y: y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, life: 20, color: color});
    }
}

canvas.addEventListener("mousemove", e => {
    let rect = canvas.getBoundingClientRect();
    mouseX = e.clientX - rect.left;
    mouseY = e.clientY - rect.top;
    trail.push({x: mouseX, y: mouseY});
    if (trail.length > 15) trail.shift();
});

canvas.addEventListener("mousedown", () => {
    if(gameOver) { restartGame(); return; }
    if(paused) return;
    if(bossActive){
        bossClicks++;
        createBurst(mouseX, mouseY, "white");
        if(bossClicks >= bossRequired){
            bossLives--;
            if(bossLives <= 0) { 
                bossActive=false; clearInterval(bossTimer); score += 50; 
                spawnRate += 300; restartSpawner();
            } else { bossClicks=0; bossTime=15; }
        }
        return;
    }
    for(let i = animals.length - 1; i >= 0; i--) {
        let a = animals[i];
        let dist = Math.hypot(mouseX - a.x, mouseY - (a.y-15));
        if(dist < 35) {
            createBurst(a.x, a.y - 15, a.color);
            if(a.isAngel) { lives++; }
            else if(a.isLifeStealer) { lives--; combo=1; }
            else if(a.isRobot) { score = Math.max(0, score-10); lives--; combo=1; }
            else {
                let now = Date.now();
                combo = (now - lastHitTime < comboTime) ? combo + 1 : 1;
                lastHitTime = now;
                score += a.points * (combo + comboBonus);
            }
            animals.splice(i, 1);
            break; 
        }
    }
});

function gameLoop(){
    drawBackground();
    
    if(paused){
        ctx.fillStyle="rgba(0,0,0,0.5)"; ctx.fillRect(0,0,700,450);
        ctx.fillStyle="white"; ctx.font="50px Arial"; ctx.textAlign="center";
        ctx.fillText("SHOP GEÖFFNET",350,225);
    } else if(gameOver) {
        ctx.fillStyle="rgba(0,0,0,0.8)"; ctx.fillRect(0,0,700,450);
        ctx.fillStyle="red"; ctx.font="60px Arial"; ctx.textAlign="center";
        ctx.fillText("GAME OVER",350,200);
    } else if(bossActive) {
        ctx.fillStyle="rgba(0,0,0,0.4)"; ctx.fillRect(0,0,700,450);
        ctx.font="120px Arial"; ctx.textAlign="center";
        ctx.fillText("🤖",350,220);
        ctx.font="25px Arial"; ctx.fillStyle="white";
        ctx.fillText("BOSS ATTACKE!", 350, 60);
        ctx.fillText("Clicks: " + bossClicks + "/" + bossRequired, 350, 300);
        ctx.fillText("Zeit: " + bossTime, 350, 340);
    } else {
        animals.forEach((a, i) => {
            a.update(); a.draw();
            if(a.y > 480) { if(!a.isRobot && !a.isLifeStealer && !a.isAngel) lives--; animals.splice(i, 1); }
        });
        particles.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy; p.life--;
            ctx.fillStyle = p.color; ctx.globalAlpha = p.life/20;
            ctx.fillRect(p.x, p.y, 4, 4); ctx.globalAlpha = 1;
            if(p.life <= 0) particles.splice(i, 1);
        });
        updateLevel();
    }
    
    drawTrail();
    if (trail.length > 0 && Math.random() > 0.3) trail.shift();

    updateUI();
    if(lives <= 0) gameOver = true;
    requestAnimationFrame(gameLoop);
}

function updateLevel(){
    let newLevel = Math.floor(score/100) + 1; 
    if(newLevel !== level){
        level = newLevel;
        spawnRate = Math.max(800, 2500 - (level * 100));
        speedMultiplier = 1 + (level * 0.05);
        restartSpawner();
        if(level >= 2 && level % 2 === 0) startBoss(); 
    }
}

function startBoss(){
    bossActive=true; bossClicks=0; bossRequired = Math.min(80, level * 10); 
    bossTime=15; bossLives=2;
    if(bossTimer) clearInterval(bossTimer);
    bossTimer=setInterval(()=>{ if(!paused) bossTime--; if(bossTime<=0){ bossTime=15; bossClicks=0; lives--; } },1000);
}

function spawnAnimal(){ if(!paused && !gameOver && !bossActive) animals.push(new Animal()); }
function restartSpawner(){ if(spawner) clearInterval(spawner); spawner=setInterval(spawnAnimal, spawnRate); }

function togglePause(){ 
    paused = !paused; 
    document.getElementById("shop-overlay").style.display = paused ? "block" : "none";
}

function restartGame(){ 
    score=0; lives=3; level=1; combo=1; comboBonus=0; speedMultiplier=1; spawnRate=2500;
    animals=[]; particles=[]; trail=[]; bossActive=false; gameOver=false; paused=false;
    document.getElementById("shop-overlay").style.display = "none";
    if(bossTimer) clearInterval(bossTimer);
    restartSpawner(); 
}

restartSpawner();
gameLoop();
</script>
</body>
</html>
