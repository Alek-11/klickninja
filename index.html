<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Hunde & Katzen Ninja - Lives Fix</title>
<style>
    body { margin:0; text-align:center; background:#111; color:white; font-family:'Segoe UI', sans-serif; overflow: hidden; }
    canvas { display:block; margin:20px auto; background:#000; border: 4px solid #333; border-radius: 8px; cursor: crosshair; }
    .stats { font-size: 20px; margin: 10px; }
    button { padding:10px 20px; font-size:16px; cursor:pointer; background: #444; color: white; border: none; border-radius: 5px; margin: 5px; }
    button:hover { background: #666; }

    /* SHOP STYLES */
    #shop-overlay { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0, 0, 0, 0.9); padding: 20px; border: 3px solid #fdbb2d; border-radius: 15px; z-index: 10; width: 300px; }
    .shop-item { margin: 15px 0; padding: 10px; border-bottom: 1px solid #444; }
    .shop-item button { background: #28a745; width: 100%; }

    /* ADMIN PANEL STYLES */
    #admin-overlay { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(10, 30, 10, 0.95); padding: 20px; border: 3px solid #00ff00; border-radius: 15px; z-index: 100; width: 280px; color: #00ff00; font-family: monospace; text-align: left; }
    #admin-overlay input[type="number"] { width: 90%; background: #000; color: #00ff00; border: 1px solid #00ff00; margin: 5px 0; padding: 5px; }
    .admin-row { margin-bottom: 12px; border-bottom: 1px solid #004400; padding-bottom: 5px; }
</style>
</head>
<body>

<div class="stats">
    Punkte: <span id="score">0</span> | Leben: <span id="lives">3</span> | Level: <span id="level">1</span> | Combo: <span id="combo">x1</span>
</div>

<button onclick="togglePause()">Shop / Pause</button>
<button onclick="restartGame()">Neustart</button>

<div id="shop-overlay">
    <h2>Ninja Shop</h2>
    <p>Deine Punkte: <span id="shop-points">0</span></p>
    <div class="shop-item">
        <span>❤️ +1 Leben</span>
        <button id="buy-life" onclick="buyItem('life')">Kaufen (50 Pkt)</button>
    </div>
    <div class="shop-item">
        <span>⚡ Combo-Booster</span>
        <button id="buy-combo" onclick="buyItem('combo')">Kaufen (100 Pkt)</button>
    </div>
    <button onclick="togglePause()" style="background:#cc0000; margin-top:10px;">Schließen</button>
</div>

<div id="admin-overlay">
    <h3 style="text-align:center;">NINJA ADMIN</h3>
    <div class="admin-row">
        <label>Punkte setzen:</label>
        <input type="number" id="admin-score-input">
    </div>
    <div class="admin-row">
        <label>Level setzen:</label>
        <input type="number" id="admin-level-input">
    </div>
    <div class="admin-row">
        <label><input type="checkbox" id="admin-auto-level" checked> Auto-Level AN</label>
    </div>
    <div class="admin-row">
        <label><input type="checkbox" id="admin-boss-toggle" checked> Bosse AN</label>
    </div>
    <button onclick="applyCheats()" style="background:#00ff00; color:black; font-weight:bold; width:100%; margin-top:10px;">SPEICHERN</button>
    <button onclick="closeAdmin()" style="background:transparent; color:#ff3333; border:1px solid #ff3333; margin-top:10px; width:100%;">Abbrechen</button>
</div>

<canvas id="game" width="700" height="450"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let score=0, lives=3, level=1, combo=1;
let spawnRate=2000; 
let gravity=0.16;   
let speedMultiplier=1.1;

let lastHitTime=0;
let animals=[];
let particles=[];
let trail = []; 
let paused=false, gameOver=false;
let spawner=null;
let mouseX=0, mouseY=0;

let bossActive=false, bossClicks=0, bossRequired=25, bossTime=15, bossLives=2, bossTimer=null;
let bossesEnabled = true, autoLevelEnabled = true, comboBonus = 0; 
const comboTime=800;

let prices = { life: 50, combo: 100 };
const ADMIN_CODE = "12345";

function buyItem(type) {
    let currentPrice = prices[type];
    if (score >= currentPrice) {
        score -= currentPrice;
        if (type === 'life') lives++;
        if (type === 'combo') comboBonus += 1;
        prices[type] = Math.ceil(currentPrice * 1.25);
        updateUI();
    } else { alert("Zu wenig Punkte!"); }
}

window.addEventListener("keydown", (e) => {
    if (e.key.toLowerCase() === "a") {
        let input = prompt("Admin-Code:");
        if (input === ADMIN_CODE) {
            paused = true;
            document.getElementById("admin-overlay").style.display = "block";
            document.getElementById("admin-score-input").value = score;
            document.getElementById("admin-level-input").value = level;
        }
    }
});

function applyCheats() {
    let sIn = document.getElementById("admin-score-input").value;
    let lIn = document.getElementById("admin-level-input").value;
    autoLevelEnabled = document.getElementById("admin-auto-level").checked;
    bossesEnabled = document.getElementById("admin-boss-toggle").checked;
    if (sIn !== "") score = parseInt(sIn);
    if (lIn !== "") {
        level = parseInt(lIn);
        spawnRate = 2000 * Math.pow(0.75, level - 1);
        speedMultiplier = 1.1 + (level * 0.1);
        restartSpawner();
    }
    updateUI(); closeAdmin();
}

function closeAdmin() { document.getElementById("admin-overlay").style.display = "none"; paused = false; }

function updateUI() {
    document.getElementById("score").innerText = isNaN(score) ? 0 : score;
    document.getElementById("shop-points").innerText = isNaN(score) ? 0 : score;
    // SICHERHEIT: Anzeige niemals unter 0
    document.getElementById("lives").innerText = Math.max(0, lives);
    document.getElementById("level").innerText = level;
    document.getElementById("combo").innerText = "x" + (combo + comboBonus);
    document.getElementById("buy-life").innerText = `Kaufen (${prices.life} Pkt)`;
    document.getElementById("buy-combo").innerText = `Kaufen (${prices.combo} Pkt)`;
}

function togglePause() {
    paused = !paused;
    document.getElementById("shop-overlay").style.display = paused ? "block" : "none";
}

function restartGame() {
    score = 0; lives = 3; level = 1; combo = 1; comboBonus = 0;
    spawnRate = 2000; gravity = 0.16; speedMultiplier = 1.1;
    prices = { life: 50, combo: 100 };
    animals = []; particles = []; trail = [];
    gameOver = false; paused = false; bossActive = false;
    clearInterval(bossTimer);
    document.getElementById("shop-overlay").style.display = "none";
    updateUI(); restartSpawner();
}

function restartSpawner() {
    clearInterval(spawner);
    spawner = setInterval(() => {
        if(!paused && !gameOver && !bossActive) animals.push(new Animal());
    }, spawnRate);
}

function updateLevel() {
    if(!autoLevelEnabled) return;
    let nextLevelThreshold = level * 50;
    if(score >= nextLevelThreshold) {
        level++;
        spawnRate = Math.max(500, spawnRate * 0.75); 
        speedMultiplier += 0.12;
        restartSpawner();
        if(level % 3 === 0 && bossesEnabled) startBoss();
        updateUI();
    }
}

function startBoss() {
    bossActive = true; bossClicks = 0; bossTime = 12; bossLives = 2;
    bossTimer = setInterval(() => {
        bossTime--;
        if(bossTime <= 0) {
            bossActive = false; clearInterval(bossTimer);
            lives--; 
            if(lives <= 0) { lives = 0; gameOver = true; }
            restartSpawner();
        }
    }, 1000);
}

function drawBackground(){
    let sky = ctx.createLinearGradient(0,0,0,450);
    sky.addColorStop(0,"#1a2a6c");
    sky.addColorStop(0.5,"#b21f1f");
    sky.addColorStop(1,"#fdbb2d");
    ctx.fillStyle = sky;
    ctx.fillRect(0,0,700,450);
    ctx.fillStyle = "rgba(34, 139, 34, 0.8)";
    ctx.fillRect(0,400,700,50);
}

function drawTrail() {
    if (trail.length < 2) return;
    ctx.save(); ctx.beginPath(); ctx.strokeStyle = "#00ffff"; ctx.lineWidth = 6; ctx.lineCap = "round";
    ctx.lineJoin = "round"; ctx.shadowBlur = 20; ctx.shadowColor = "#00ffff";
    ctx.moveTo(trail[0].x, trail[0].y);
    for (let i = 1; i < trail.length; i++) ctx.lineTo(trail[i].x, trail[i].y);
    ctx.stroke(); ctx.strokeStyle = "white"; ctx.lineWidth = 2; ctx.stroke(); ctx.restore();
}

class Animal {
    constructor(){
        this.x = 100 + Math.random()*500; this.y = 460;
        this.isRobot=false; this.isLifeStealer=false; this.isAngel=false;
        let r=Math.random();
        
        if(r<0.20){ this.type="🐶"; this.color="#ffcc33"; this.points=1; }
        else if(r<0.40){ this.type="🐱"; this.color="#ff99cc"; this.points=1; }
        else if(r<0.70){ this.type="🤖"; this.color="#777"; this.points=-5; this.isRobot=true; }
        else if(r<0.82){ this.type="👿"; this.color="#9900cc"; this.points=0; this.isLifeStealer=true; }
        else if(r<0.90){ this.type="😇"; this.color="#ffffff"; this.points=0; this.isAngel=true; }
        else { this.type="🐹"; this.color="#ffd700"; this.points=10; } 
        
        this.vy = -(9 + Math.random()*2) * speedMultiplier;
        this.vx = (Math.random() - 0.5) * 4;
    }
    update(){ 
        this.vy += gravity; this.y += this.vy; this.x += this.vx; 
        if(this.y < 30) { this.vy = Math.abs(this.vy) * 0.4; } 
    }
    draw(){ ctx.font="40px Arial"; ctx.textAlign="center"; ctx.fillText(this.type, this.x, this.y); }
}

function createBurst(x, y, color) {
    for(let i=0; i<8; i++) particles.push({x: x, y: y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, life: 15, color: color});
}

canvas.addEventListener("mousemove", e => {
    let rect = canvas.getBoundingClientRect();
    mouseX = e.clientX - rect.left; mouseY = e.clientY - rect.top;
    trail.push({x: mouseX, y: mouseY});
    if (trail.length > 12) trail.shift();
});

canvas.addEventListener("mousedown", () => {
    if(gameOver) { restartGame(); return; }
    if(paused) return;
    if(bossActive){
        bossClicks++; createBurst(mouseX, mouseY, "white");
        if(bossClicks >= bossRequired){
            bossActive=false; clearInterval(bossTimer); score += 100; restartSpawner();
        }
        return;
    }
    for(let i = animals.length - 1; i >= 0; i--) {
        let a = animals[i];
        if(Math.hypot(mouseX - a.x, mouseY - (a.y-15)) < 40) {
            createBurst(a.x, a.y - 15, a.color);
            if(a.isAngel) { lives++; }
            else if(a.isLifeStealer || a.isRobot) { 
                lives--; 
                if(lives <= 0) { lives = 0; gameOver = true; }
                combo = 1;
                score = Math.max(0, score + (a.points || 0)); 
            } else {
                combo = (Date.now() - lastHitTime < comboTime) ? combo + 1 : 1;
                lastHitTime = Date.now();
                score += (a.points || 0) * (combo + comboBonus);
            }
            animals.splice(i, 1); break; 
        }
    }
});

function gameLoop(){
    drawBackground();
    if(gameOver) {
        ctx.fillStyle="rgba(0,0,0,0.7)"; ctx.fillRect(0,0,700,450);
        ctx.fillStyle="red"; ctx.font="60px Arial"; ctx.textAlign="center"; ctx.fillText("GAME OVER",350,225);
    } else if(bossActive) {
        ctx.fillStyle="rgba(0,0,0,0.4)"; ctx.fillRect(0,0,700,450);
        ctx.font="120px Arial"; ctx.textAlign="center"; ctx.fillText("🤖",350,220);
        ctx.font="25px Arial"; ctx.fillStyle="white";
        ctx.fillText("BOSS!", 350, 60);
        ctx.fillText("Clicks: " + bossClicks + "/" + bossRequired, 350, 300);
        ctx.fillText("Zeit: " + bossTime, 350, 340);
    } else {
        animals.forEach((a, i) => {
            a.update(); a.draw();
            if(a.y > 480) { 
                if(!a.isRobot && !a.isLifeStealer && !a.isAngel) { 
                    lives--; 
                    if(lives <= 0) { lives = 0; gameOver = true; }
                } 
                animals.splice(i, 1); 
            }
        });
        particles.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy; p.life--; ctx.fillStyle = p.color;
            ctx.fillRect(p.x, p.y, 3, 3);
            if(p.life <= 0) particles.splice(i, 1);
        });
        updateLevel();
    }
    drawTrail();
    if (trail.length > 0 && Math.random() > 0.3) trail.shift();
    updateUI(); requestAnimationFrame(gameLoop);
}
restartSpawner(); gameLoop();
</script>
</body>
</html>
